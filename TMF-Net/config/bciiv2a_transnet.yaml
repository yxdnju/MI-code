# Model
network: TMFNet
network_args:

  num_channels: 22
  embed_dim: 32
  pool_size: 50
  pool_stride: 15
  num_heads: 8
  fc_ratio: 4
  depth: 4
  attn_drop: 0.5
  fc_drop: 0.5
# Data
data_path: you_path
out_folder: output/bci_iv_2a

# Training
preferred_device: gpu
nGPU: 0
random_seed: 0

batch_size: 24

epochs: 1500

lr: 0.0002

# Data augmentation
num_classes: 4
num_segs: 8
